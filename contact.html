<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="html" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Digital Skills Academy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">Digital Academy</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section style="text-align: center; margin-bottom: 2rem;">
            <h2>Get In Touch</h2>
            <p>Email: info@digitalskillsacademy.com | Phone: +123 456 7890</p>
        </section>
        <section>
            <form action="#" method="POST">
                <label for="name">Your Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
                <label for="email">Your Email</label>
                <input type="email" id="email" placeholder="john@example.com" required>
                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="How can we help you?" required></textarea>
                <button type="submit">Submit Inquiry</button>
            </form>
        </section>
        <section style="text-align: center; margin-top: 3rem;">
            <h3>Follow Our Channels</h3>
            <p style="gap:1rem; display:flex; justify-content:center; margin-top:0.5rem;">
                <a href="https://google.com" target="_blank">Google Hub</a> | 
                <a href="https://github.com" target="_blank">GitHub Profile</a> | 
                <a href="https://linkedin.com" target="_blank">LinkedIn Page</a>
            </p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Digital Skills Training Academy. All rights reserved.</p>
    </footer>
</body>
</html>
